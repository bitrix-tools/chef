name: Publish Package to npm via Trusted Publisher

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual publish)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v23.5
        uses: actions/setup-node@v4
        with:
          node-version: '23.5'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@bitrix'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build package
        run: npm run build

      - name: Publish to npm (Trusted Publisher)
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running in dry-run mode..."
            npm publish --dry-run
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
