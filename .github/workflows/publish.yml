name: Publish Package to npm via Trusted Publisher

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no actual publish)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js v23.5
        uses: actions/setup-node@v4
        with:
          node-version: '23.5'
          registry-url: 'https://registry.npmjs.org/'
          scope: '@bitrix'

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build

      - name: Verify release tag matches package.json version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          
          STRIPPED_RELEASE_TAG=${RELEASE_TAG#v}
          
          if [ "$STRIPPED_RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Error: Release tag '$RELEASE_TAG' does not match package.json version '$PACKAGE_VERSION'."
            exit 1
          fi
          echo "Release tag matches package.json version: $PACKAGE_VERSION"

      - name: Verify version doesn't exist yet on npm
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "@bitrix/chef@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "Error: Version @bitrix/chef@$PACKAGE_VERSION already exists on npm."
            exit 1
          fi

      - name: Publish to npm (Trusted Publisher)
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running in dry-run mode..."
            npm publish --dry-run
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
